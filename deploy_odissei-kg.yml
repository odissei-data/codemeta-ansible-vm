---
- name: Odissei Knowledge Graph Deployment
  hosts: all
  become: yes

  vars:
    odissei_kg_repo: https://github.com/odissei-data/odissei-kg.git
    odissei_kg_dir: /opt/odissei-kg
    java_version: 11
    maven_version: 3.8.6

  tasks:
  - name: Update and upgrade apt packages
    apt:
      update_cache: yes
      cache_valid_time: 3600
      upgrade: yes

  - name: Install dependencies
    apt:
      name:
        - git
        - openjdk-{{ java_version }}-jdk
        - maven
        - python3-pip
      state: present

  - name: Install pip dependencies
    pip:
      name:
        - ansible
      state: present

  - name: Clone Odissei Knowledge Graph repository
    git:
      repo: "{{ odissei_kg_repo }}"
      dest: "{{ odissei_kg_dir }}"
      version: main
      force: yes

  - name: Build Odissei Knowledge Graph
    shell:
      cmd: "mvn clean package -DskipTests"
      chdir: "{{ odissei_kg_dir }}"

  - name: Configure Odissei Knowledge Graph
    template:
      src: templates/application.properties.j2
      dest: "{{ odissei_kg_dir }}/application.properties"
      mode: '0644'
    notify: restart odissei-kg

  - name: Create systemd service file
    template:
      src: templates/odissei-kg.service.j2
      dest: /etc/systemd/system/odissei-kg.service
      mode: '0644'
    notify: restart odissei-kg

  - name: Enable and start Odissei Knowledge Graph service
    systemd:
      name: odissei-kg
      state: started
      enabled: yes

  handlers:
  - name: restart odissei-kg
    systemd:
      name: odissei-kg
      state: restarted