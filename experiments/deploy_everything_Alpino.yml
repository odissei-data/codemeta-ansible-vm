- name: End-to-End Deployment for Alpino
  hosts: localhost
  become: true
  tasks:
  - name: Update apt cache
    apt:
      update_cache: 'yes'
    when: ansible_os_family == 'Debian'
  - name: Ensure Git is installed
    package:
      name: git
      state: present
  - name: Clone Alpino repository
    git:
      repo: https://github.com/rug-compling/Alpino
      dest: /opt/Alpino
      clone: 'yes'
      update: 'yes'
  - name: Install Runtimes and Tools
    package:
      name:
      - Prolog
      state: present
    ignore_errors: true
