- hosts: localhost
  become: true
  tasks:
  - name: Atualizar APT
    apt:
      update_cache: 'yes'
  - name: "Clonar Reposit\xF3rio"
    git:
      repo: https://github.com/odissei-data/ODISSEI-code-library
      dest: /home/ubuntu/ODISSEI-code-library
  - name: Instalar ruby
    package:
      name: ruby
      state: present
    ignore_errors: true
  - name: Configurar entrada na pasta
    lineinfile:
      path: /home/ubuntu/.bashrc
      line: cd /home/ubuntu/ODISSEI-code-library
      state: present
